spring.application.name=pixelhive-backend

# =========================================================
# Database connection
# Development: defaults to your LOCAL PostgreSQL (values below).
# Production: override these with environment variables that
# point at Supabase, so real secrets never live in this file.
#   ${DB_URL:default} means "use env var DB_URL if set, else the default".
# =========================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pixelhive}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:pixelhive}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================
# JPA / Hibernate
# We manage the schema ourselves (database/schema.sql), so Hibernate
# must never change it. 'none' = Hibernate keeps its hands off the tables.
# show-sql prints every SQL query it runs so you can see what happens.
# =========================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
